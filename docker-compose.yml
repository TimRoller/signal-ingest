services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
      POSTGRES_DB: signal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - miniodata:/data

  ingest_api:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+asyncpg://signal:signal@postgres:5432/signal
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_REGION: us-east-1
      BRONZE_BUCKET: bronze
      SERVICE_NAME: ingest_api
    command:
      - sh
      - -c
      - |
        DATABASE_URL=postgresql+asyncpg://signal:signal@postgres:5432/signal alembic upgrade head &&
        exec uvicorn services.ingest_api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
    command: ["python", "-m", "services.worker.main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp_server:
    build:
      context: .
    command: ["uvicorn", "services.mcp_server.main:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
